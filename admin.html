<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>지학원라이프 · 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh;color:#1a1a2e}
.header{background:#1b2a4a;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{width:34px;height:34px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px}
.header h1{font-size:15px;font-weight:600;color:#fff}
.header p{font-size:10px;color:rgba(255,255,255,0.55);margin-top:1px}
.logout{margin-left:auto;background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #e5e5e5;position:sticky;top:62px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 15px;border-radius:999px;border:0.5px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#888;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab i{font-size:15px}
.tab.active{background:#1b2a4a;color:#fff;border-color:#1b2a4a}
.tab .cnt{font-size:10px;background:#e74c3c;color:#fff;border-radius:999px;padding:1px 6px;margin-left:2px}
.content{padding:16px;max-width:760px;margin:0 auto}
.bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bar h2{font-size:15px;font-weight:600}
.addbtn{background:#1b2a4a;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.card{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;padding:14px 16px;margin-bottom:10px}
.row-item{display:flex;gap:12px;align-items:flex-start}
.row-item .body{flex:1;min-width:0}
.row-item h4{font-size:14px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.row-item p{font-size:12px;color:#777;line-height:1.5;white-space:pre-line;word-break:break-word}
.meta{font-size:11px;color:#aaa;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500}
.b-r{background:#ffebeb;color:#c0392b}.b-b{background:#e8f0fe;color:#1a56db}.b-g{background:#f0f0f0;color:#666}
.b-pin{background:#fff3d6;color:#b8860b}
.b-on{background:#e8f8f0;color:#1a7a4a}.b-off{background:#f0f0f0;color:#999}
.rowbtns{display:flex;gap:6px;flex-shrink:0}
.iconbtn{width:32px;height:32px;border-radius:8px;border:0.5px solid #ddd;background:#fff;cursor:pointer;color:#666;display:flex;align-items:center;justify-content:center;font-size:15px}
.iconbtn.del:hover{background:#ffebeb;border-color:#f5c0c0;color:#c0392b}
.fl{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fl label{font-size:11px;color:#999;font-weight:600}
.fl input,.fl select,.fl textarea{font-size:14px;padding:10px 12px;border-radius:10px;border:0.5px solid #ddd;background:#fafafa;color:#1a1a2e;font-family:inherit;width:100%}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:#1b2a4a;background:#fff}
.fl textarea{resize:vertical;min-height:90px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:#444;cursor:pointer;margin-bottom:11px}
.chk input{width:18px;height:18px}
.sbtn{flex:1;padding:12px;background:#1b2a4a;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.gbtn{flex:1;padding:12px;background:#f0f0f2;color:#555;border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.empty{text-align:center;color:#bbb;font-size:13px;padding:40px 0}
.loading{text-align:center;color:#bbb;font-size:13px;padding:40px 0}
/* 로그인 */
.login-wrap{max-width:340px;margin:60px auto 0;padding:0 20px;text-align:center}
.login-wrap .ico{font-size:46px;margin-bottom:14px}
.login-wrap h2{font-size:18px;margin-bottom:6px}
.login-wrap p{font-size:12px;color:#999;margin-bottom:22px}
.login-wrap input{width:100%;font-size:15px;padding:13px 14px;border-radius:11px;border:0.5px solid #ddd;background:#fafafa;font-family:inherit;text-align:center;margin-bottom:10px}
.login-wrap input:focus{outline:none;border-color:#1b2a4a;background:#fff}
.login-wrap button{width:100%;padding:13px;background:#1b2a4a;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.login-err{color:#c0392b;font-size:12px;margin-bottom:10px;min-height:16px}
/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(20,25,40,0.45);display:none;align-items:flex-end;justify-content:center;z-index:200}
.modal-bg.open{display:flex}
.modal{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:20px 18px;max-height:90vh;overflow-y:auto}
@media(min-width:560px){.modal-bg{align-items:center}.modal{border-radius:18px}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal .btns{display:flex;gap:8px;margin-top:6px}
/* 결과 바 */
.tally{margin-top:4px}
.tally-row{margin-bottom:9px}
.tally-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.tally-bar{height:9px;background:#eef0f4;border-radius:999px;overflow:hidden}
.tally-fill{height:100%;background:#1b2a4a;border-radius:999px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login" class="login-wrap">
  <div class="ico">🔐</div>
  <h2>관리자 로그인</h2>
  <p>지학원라이프 관리 페이지</p>
  <div class="login-err" id="login-err"></div>
  <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">로그인</button>
</div>

<!-- 관리 화면 -->
<div id="app" style="display:none">
  <div class="header">
    <div class="logo">🛠️</div>
    <div>
      <h1>지학원라이프 관리자</h1>
      <p>공지 · 투표 · 민원 관리</p>
    </div>
    <button class="logout" onclick="logout()">로그아웃</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tb0" onclick="go(0)"><i class="ti ti-speakerphone"></i>공지</button>
    <button class="tab" id="tb1" onclick="go(1)"><i class="ti ti-chart-bar"></i>투표</button>
    <button class="tab" id="tb2" onclick="go(2)"><i class="ti ti-message-report"></i>민원<span class="cnt" id="cnt-complaint" style="display:none"></span></button>
  </div>
  <div class="content" id="ct"></div>
</div>

<!-- 모달 -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_a9EHm21_woqtfdgZWvh8rhYD-BB5R26ND5W1zad-8UruwdhlnLIYlBcuUndeZ_JDjA/exec';

let PW = sessionStorage.getItem('admin_pw') || '';
let curTab = 0;
let cache = { notices: [], votes: [], complaints: [] };

// ───────── API ─────────
async function apiGet(type, params = {}) {
  const q = new URLSearchParams({ type, pw: PW, ...params });
  const res = await fetch(SCRIPT_URL + '?' + q.toString());
  return res.json();
}
async function apiPost(payload) {
  payload.pw = PW;
  let result = { ok: true, _assumed: true };
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    result = await res.json();
  } catch (e) { /* 응답을 못 읽어도 요청은 전달됨 → 목록 새로고침으로 확인 */ }
  return result;
}

// ───────── 로그인 ─────────
async function doLogin() {
  const v = document.getElementById('pw-input').value.trim();
  const err = document.getElementById('login-err');
  if (!v) { err.textContent = '비밀번호를 입력해 주세요.'; return; }
  err.textContent = '확인 중...';
  PW = v;
  try {
    const r = await apiGet('adminLogin');
    if (r && r.ok) {
      sessionStorage.setItem('admin_pw', PW);
      showApp();
    } else {
      err.textContent = '비밀번호가 올바르지 않습니다.';
      PW = '';
    }
  } catch (e) {
    err.textContent = '연결 오류. 잠시 후 다시 시도해 주세요.';
    PW = '';
  }
}
function logout() {
  sessionStorage.removeItem('admin_pw');
  PW = '';
  location.reload();
}
function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  go(0);
  refreshComplaintCount();
}

// ───────── 탭 ─────────
function go(i) {
  curTab = i;
  for (let j = 0; j < 3; j++) document.getElementById('tb' + j).classList.toggle('active', j === i);
  [drawNotices, drawVotes, drawComplaints][i]();
  window.scrollTo(0, 0);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function today() { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ════════ 공지 ════════
const IMP_OPTS = ['🔴 긴급', '🔵 일반', '🟢 안내'];
const CAT_OPTS = ['일반', '생활', '학습', '행사', '기타'];

function impBadge(imp) {
  const c = (imp||'').includes('긴급') ? 'b-r' : (imp||'').includes('일반') ? 'b-b' : 'b-g';
  return `<span class="badge ${c}">${esc(imp||'안내')}</span>`;
}

async function drawNotices() {
  const ct = document.getElementById('ct');
  ct.innerHTML = `<div class="loading">불러오는 중...</div>`;
  const r = await apiGet('adminNotices');
  cache.notices = (r && r.rows) || [];
  const items = cache.notices.map(n => `
    <div class="card">
      <div class="row-item">
        <div class="body">
          <h4>${n.pinned ? '📌' : ''} ${esc(n.title)} ${impBadge(n.importance)}</h4>
          <p>${esc(n.content)}</p>
          <div class="meta">
            ${n.category ? `<span>🏷️ ${esc(n.category)}</span>` : ''}
            <span>🗓️ ${esc(n.startDate || n.writeDate)}${n.endDate ? ' ~ ' + esc(n.endDate) : ''}</span>
            ${n.attach ? `<span>📎 첨부</span>` : ''}
          </div>
        </div>
        <div class="rowbtns">
          <button class="iconbtn" onclick='noticeForm(${n.row})'><i class="ti ti-pencil"></i></button>
          <button class="iconbtn del" onclick='del("adminNoticeDelete",${n.row},"공지를 삭제할까요?")'><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`).join('');
  ct.innerHTML = `
    <div class="bar">
      <h2>공지사항 (${cache.notices.length})</h2>
      <button class="addbtn" onclick="noticeForm()"><i class="ti ti-plus"></i> 새 공지</button>
    </div>
    ${items || '<div class="empty">등록된 공지가 없습니다.</div>'}`;
}

function noticeForm(row) {
  const n = row ? cache.notices.find(x => x.row === row) : {};
  const sel = (arr, v) => arr.map(o => `<option ${o===v?'selected':''}>${o}</option>`).join('');
  openModal(`
    <h3>${row ? '공지 수정' : '새 공지'}</h3>
    <div class="fl"><label>제목</label><input id="n-title" value="${esc(n.title)}" placeholder="공지 제목"></div>
    <div class="fl"><label>내용</label><textarea id="n-content" placeholder="공지 내용">${esc(n.content)}</textarea></div>
    <div class="frow">
      <div class="fl"><label>중요도</label><select id="n-imp">${sel(IMP_OPTS, n.importance || '🟢 안내')}</select></div>
      <div class="fl"><label>카테고리</label><select id="n-cat">${sel(CAT_OPTS, n.category || '일반')}</select></div>
    </div>
    <div class="frow">
      <div class="fl"><label>노출 시작일</label><input type="date" id="n-start" value="${esc(n.startDate || today())}"></div>
      <div class="fl"><label>노출 종료일 (선택)</label><input type="date" id="n-end" value="${esc(n.endDate)}"></div>
    </div>
    <div class="fl"><label>첨부링크 (선택)</label><input id="n-attach" value="${esc(n.attach)}" placeholder="https://..."></div>
    <label class="chk"><input type="checkbox" id="n-pin" ${n.pinned ? 'checked' : ''}> 상단 고정 📌</label>
    <div class="btns">
      <button class="gbtn" onclick="closeModal()">취소</button>
      <button class="sbtn" onclick="saveNotice(${row || 0})">저장</button>
    </div>`);
}

async function saveNotice(row) {
  const title = document.getElementById('n-title').value.trim();
  if (!title) { toast('제목을 입력해 주세요.'); return; }
  const payload = {
    type: row ? 'adminNoticeUpdate' : 'adminNoticeAdd',
    row: row || undefined,
    title,
    content: document.getElementById('n-content').value.trim(),
    importance: document.getElementById('n-imp').value,
    category: document.getElementById('n-cat').value,
    startDate: document.getElementById('n-start').value,
    endDate: document.getElementById('n-end').value,
    attach: document.getElementById('n-attach').value.trim(),
    pinned: document.getElementById('n-pin').checked,
    writeDate: row ? undefined : today()
  };
  await apiPost(payload);
  closeModal();
  toast(row ? '수정했어요' : '등록했어요');
  drawNotices();
}

// ════════ 투표 ════════
async function drawVotes() {
  const ct = document.getElementById('ct');
  ct.innerHTML = `<div class="loading">불러오는 중...</div>`;
  const r = await apiGet('adminVotes');
  cache.votes = (r && r.rows) || [];
  const items = cache.votes.map(v => `
    <div class="card">
      <div class="row-item">
        <div class="body">
          <h4>${esc(v.title)}
            <span class="badge ${v.active ? 'b-on' : 'b-off'}">${v.active ? '진행중' : '종료'}</span>
            <span class="badge b-g">${v.method === '복수' ? '복수선택' : '단일선택'}</span>
          </h4>
          ${v.desc ? `<p>${esc(v.desc)}</p>` : ''}
          <div class="meta">${v.options.map(o => `<span>· ${esc(o)}</span>`).join('')}</div>
        </div>
        <div class="rowbtns">
          <button class="iconbtn" onclick='voteResults(${v.row})' title="결과"><i class="ti ti-chart-pie"></i></button>
          <button class="iconbtn" onclick='voteForm(${v.row})'><i class="ti ti-pencil"></i></button>
          <button class="iconbtn del" onclick='del("adminVoteDelete",${v.row},"투표를 삭제할까요?")'><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`).join('');
  ct.innerHTML = `
    <div class="bar">
      <h2>투표 (${cache.votes.length})</h2>
      <button class="addbtn" onclick="voteForm()"><i class="ti ti-plus"></i> 새 투표</button>
    </div>
    ${items || '<div class="empty">등록된 투표가 없습니다.</div>'}`;
}

function voteForm(row) {
  const v = row ? cache.votes.find(x => x.row === row) : { options: [] };
  const opts = (v.options || []).slice(); while (opts.length < 5) opts.push('');
  openModal(`
    <h3>${row ? '투표 수정' : '새 투표'}</h3>
    <div class="fl"><label>제목</label><input id="v-title" value="${esc(v.title)}" placeholder="투표 제목"></div>
    <div class="fl"><label>설명 (선택)</label><input id="v-desc" value="${esc(v.desc)}" placeholder="간단한 안내"></div>
    <div class="fl"><label>선택 방식</label><select id="v-method">
      <option ${v.method!=='복수'?'selected':''}>단일</option>
      <option ${v.method==='복수'?'selected':''}>복수</option>
    </select></div>
    <div class="fl"><label>보기 (최소 2개)</label>
      ${opts.map((o,i)=>`<input id="v-opt${i}" value="${esc(o)}" placeholder="보기 ${i+1}" style="margin-bottom:6px">`).join('')}
    </div>
    <label class="chk"><input type="checkbox" id="v-active" ${row && !v.active ? '' : 'checked'}> 학생에게 공개 (진행중)</label>
    <div class="btns">
      <button class="gbtn" onclick="closeModal()">취소</button>
      <button class="sbtn" onclick="saveVote(${row || 0}, ${row ? `'${esc(v.id)}'` : 'null'})">저장</button>
    </div>`);
}

async function saveVote(row, id) {
  const title = document.getElementById('v-title').value.trim();
  const options = [0,1,2,3,4].map(i => document.getElementById('v-opt'+i).value.trim()).filter(Boolean);
  if (!title) { toast('제목을 입력해 주세요.'); return; }
  if (options.length < 2) { toast('보기를 2개 이상 입력해 주세요.'); return; }
  const payload = {
    type: row ? 'adminVoteUpdate' : 'adminVoteAdd',
    row: row || undefined,
    id: id || undefined,
    title,
    desc: document.getElementById('v-desc').value.trim(),
    method: document.getElementById('v-method').value,
    options,
    active: document.getElementById('v-active').checked
  };
  await apiPost(payload);
  closeModal();
  toast(row ? '수정했어요' : '등록했어요');
  drawVotes();
}

async function voteResults(row) {
  const v = cache.votes.find(x => x.row === row);
  openModal(`<h3>📊 ${esc(v.title)}</h3><div class="loading">집계 중...</div>`);
  const r = await apiGet('adminVoteResults', { voteId: v.id });
  const tally = (r && r.tally) || { voters: 0, counts: {} };
  const total = tally.voters || 0;
  const rows = v.options.map(o => {
    const c = tally.counts[o] || 0;
    const pct = total ? Math.round(c / total * 100) : 0;
    return `<div class="tally-row">
      <div class="tally-top"><span>${esc(o)}</span><span>${c}표 · ${pct}%</span></div>
      <div class="tally-bar"><div class="tally-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('modal').innerHTML = `
    <h3>📊 ${esc(v.title)}</h3>
    <p style="font-size:12px;color:#999;margin-bottom:14px">참여 ${total}명${v.method==='복수'?' (복수선택)':''}</p>
    <div class="tally">${rows}</div>
    <div class="btns" style="margin-top:16px"><button class="sbtn" onclick="closeModal()">닫기</button></div>`;
}

// ════════ 민원 ════════
const STATUS = ['접수됨', '처리중', '처리완료'];
function catEmoji(c) { return ({'시설':'🏠','지학원운영':'📋','타학사생':'👥','기타':'💬'})[c] || '📨'; }

async function drawComplaints() {
  const ct = document.getElementById('ct');
  ct.innerHTML = `<div class="loading">불러오는 중...</div>`;
  const r = await apiGet('adminComplaints');
  cache.complaints = ((r && r.rows) || []).reverse(); // 최신 먼저
  const items = cache.complaints.map(c => `
    <div class="card">
      <div class="row-item">
        <div class="body">
          <h4>${catEmoji(c.category)} ${esc(c.name)} <span style="font-weight:400;color:#aaa;font-size:12px">${esc(c.hakbun)}</span>
            <span class="badge ${c.status==='처리완료'?'b-on':c.status==='처리중'?'b-b':'b-g'}">${esc(c.status)}</span></h4>
          <p>${esc(c.content)}</p>
          <div class="meta"><span>🏷️ ${esc(c.category)}</span><span>🕒 ${esc(c.datetime)}</span></div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <select onchange='setStatus(${c.row}, this.value)' style="flex:1;font-size:13px;padding:8px 10px;border-radius:9px;border:0.5px solid #ddd;background:#fafafa;font-family:inherit">
              ${STATUS.map(s=>`<option ${s===c.status?'selected':''}>${s}</option>`).join('')}
            </select>
            <button class="iconbtn del" onclick='del("adminComplaintDelete",${c.row},"이 민원을 삭제할까요?")'><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`).join('');
  ct.innerHTML = `
    <div class="bar"><h2>민원 (${cache.complaints.length})</h2></div>
    ${items || '<div class="empty">접수된 민원이 없습니다.</div>'}`;
}

async function setStatus(row, status) {
  await apiPost({ type: 'adminComplaintStatus', row, status });
  toast('상태를 변경했어요');
  refreshComplaintCount();
}

async function refreshComplaintCount() {
  try {
    const r = await apiGet('adminComplaints');
    const pending = ((r && r.rows) || []).filter(c => c.status !== '처리완료').length;
    const el = document.getElementById('cnt-complaint');
    if (pending > 0) { el.textContent = pending; el.style.display = ''; }
    else el.style.display = 'none';
  } catch (e) {}
}

// ════════ 공통: 삭제 ════════
async function del(type, row, msg) {
  if (!confirm(msg)) return;
  await apiPost({ type, row });
  toast('삭제했어요');
  [drawNotices, drawVotes, drawComplaints][curTab]();
  if (type === 'adminComplaintDelete') refreshComplaintCount();
}

// 시작: 저장된 비번 있으면 자동 로그인 시도
(async function init() {
  if (PW) {
    try { const r = await apiGet('adminLogin'); if (r && r.ok) { showApp(); return; } } catch (e) {}
    PW = ''; sessionStorage.removeItem('admin_pw');
  }
})();
</script>
</body>
</html>
