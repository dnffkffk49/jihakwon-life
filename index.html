<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>지학원라이프</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh}
.header{background:#1b2a4a;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header h1{font-size:16px;font-weight:600;color:#fff}
.header p{font-size:10px;color:rgba(255,255,255,0.55);margin-top:1px}
.tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #e5e5e5;position:sticky;top:62px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:999px;border:0.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#888;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab i{font-size:14px}
.tab.active{background:#1b2a4a;color:#fff;border-color:#1b2a4a}
.content{padding:16px;max-width:600px;margin:0 auto}
/* 공통 카드 */
.card{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;padding:14px 16px;margin-bottom:10px}
.ctitle{font-size:11px;font-weight:500;color:#999;margin-bottom:12px}
/* 공지 */
.hero{background:#1b2a4a;border-radius:14px;padding:16px;margin-bottom:10px;color:#fff}
.hero-tag{font-size:10px;background:rgba(255,255,255,0.2);border-radius:999px;padding:3px 9px;display:inline-block;margin-bottom:8px}
.hero h2{font-size:15px;font-weight:600;line-height:1.5}
.hero .hdate{font-size:10px;color:rgba(255,255,255,0.55);margin-top:6px}
.nitem{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.ndot{width:7px;height:7px;border-radius:50%;background:#1b2a4a;flex-shrink:0;margin-top:4px}
.ndot.g{background:#ccc}
.nitem h4{font-size:13px;font-weight:500;color:#1a1a2e;margin-bottom:2px}
.nitem p{font-size:11px;color:#999}
.nbadge{font-size:9px;padding:2px 6px;border-radius:999px;margin-left:4px}
.nb-r{background:#ffebeb;color:#c0392b}
.nb-b{background:#e8f0fe;color:#1a56db}
.nb-g{background:#f0f0f0;color:#666}
/* 외출 */
.fl{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl label{font-size:11px;color:#999;font-weight:500}
.fl input,.fl select,.fl textarea{font-size:13px;padding:9px 11px;border-radius:10px;border:0.5px solid #ddd;background:#fafafa;color:#1a1a2e;font-family:inherit;width:100%}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:#1b2a4a}
.fl textarea{resize:none;height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.apill{font-size:9px;background:#e8f0fe;color:#1a56db;padding:2px 7px;border-radius:999px;margin-left:4px}
.gresult{background:#f0f7ff;border:0.5px solid #b3d1f7;border-radius:10px;padding:8px 12px;margin-top:6px;font-size:12px;color:#1a56db;display:none}
.sbtn{width:100%;padding:12px;background:#1b2a4a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.sbtn:disabled{background:#aaa;cursor:not-allowed}
/* 일정 */
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chdr h2{font-size:14px;font-weight:600;color:#1a1a2e}
.cnbtn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit;color:#555}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cdl{text-align:center;font-size:10px;color:#bbb;padding:3px 0}
.cdl.s{color:#e74c3c}.cdl.sa{color:#3498db}
.cc{text-align:center;font-size:11px;border-radius:8px;cursor:pointer;color:#1a1a2e;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;gap:2px}
.cc.sel{background:#1b2a4a;color:#fff}
.cc.tod{background:#e8ecf5;color:#1b2a4a;font-weight:600}
.cc.hol{color:#e74c3c}
.cc.sat{color:#3498db}
.cc.emp{pointer-events:none;opacity:0}
.dots{display:flex;gap:2px;justify-content:center}
.dot{width:4px;height:4px;border-radius:50%}
.dot-o{background:#e74c3c}.dot-i{background:#2ecc71}.dot-h{background:#f39c12}
.erow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid #f5f5f5}
.erow:last-child{border-bottom:none}
.etag{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:500;flex-shrink:0}
.et-o{background:#ffebeb;color:#c0392b}
.et-i{background:#e8f8f0;color:#1a7a4a}
.et-h{background:#fff5e6;color:#d35400}
.edetail{font-size:12px;color:#666}
.legend{display:flex;gap:14px;padding:4px 2px}
.leg{font-size:10px;color:#999;display:flex;align-items:center;gap:4px}
/* 연락처 */
.ccard{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;overflow:hidden;margin-bottom:10px}
.crow{display:flex;align-items:center;padding:13px 15px;gap:12px;border-bottom:0.5px solid #f5f5f5}
.crow:last-child{border-bottom:none}
.cico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ci-g{background:#e1f5ee;color:#0f6e56}
.ci-b{background:#e6f1fb;color:#185fa5}
.ci-a{background:#faeeda;color:#854f0b}
.ci-r{background:#ffebeb;color:#c0392b}
.cn2{font-size:13px;font-weight:500;color:#1a1a2e}
.cr2{font-size:11px;color:#999}
.cbtn{background:#1b2a4a;color:#fff;border:none;border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0;text-decoration:none}
/* 민원 */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.cat-btn{padding:11px 8px;border-radius:10px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:#555;text-align:center}
.cat-btn.selected{border-color:#1b2a4a;background:#1b2a4a;color:#fff;font-weight:500}
.submit-result{background:#e8f8f0;border:0.5px solid #a8dfc0;border-radius:12px;padding:20px;text-align:center;display:none;margin-bottom:10px}
.submit-result .check{font-size:36px;margin-bottom:8px}
.submit-result h3{font-size:14px;font-weight:600;color:#1a7a4a;margin-bottom:4px}
.submit-result p{font-size:12px;color:#2a9a5a}
/* 하단 여백 */
.bottom-space{height:24px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏫</div>
  <div>
    <h1>지학원라이프</h1>
    <p>산남고 지학원 학사생 전용</p>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" id="tb0" onclick="go(0)"><i class="ti ti-speakerphone" aria-hidden="true"></i>공지</button>
  <button class="tab" id="tb1" onclick="go(1)"><i class="ti ti-calendar-event" aria-hidden="true"></i>일정</button>
  <button class="tab" id="tb2" onclick="go(2)"><i class="ti ti-clipboard-text" aria-hidden="true"></i>외출</button>
  <button class="tab" id="tb3" onclick="go(3)"><i class="ti ti-flame" aria-hidden="true"></i>열품타</button>
  <button class="tab" id="tb4" onclick="go(4)"><i class="ti ti-phone-call" aria-hidden="true"></i>연락</button>
  <button class="tab" id="tb5" onclick="go(5)"><i class="ti ti-message-report" aria-hidden="true"></i>민원</button>
</div>

<div class="content" id="ct"></div>

<script>
let curTab=0, calY=2026, calM=6, calD=3;
let studentDB=null, lookupTimer=null, selCat='';

function go(i){
  curTab=i;
  for(let j=0;j<6;j++) document.getElementById('tb'+j).classList.toggle('active',j===i);
  document.getElementById('ct').innerHTML='';
  [drawNotice,drawCal,drawForm,drawYeolpumta,drawContact,drawComplaint][i]();
  window.scrollTo(0,0);
}

// ── 공지 ──
async function drawNotice(){
  const ct=document.getElementById('ct');
  ct.innerHTML=`<div style="text-align:center;padding:48px 0;color:#bbb;font-size:13px">불러오는 중...</div>`;
  const NOTICES_URL='https://script.google.com/macros/s/AKfycbw6WvCSPcbr2R7smU9GJy-_RDU30oxKuchl-sy_u9aN0qS9YZn8kuPYHji5yQNDtvV-/exec';
  try{
    const res=await fetch(NOTICES_URL);
    const notices=await res.json();
    if(!Array.isArray(notices)) throw new Error();
    const bc=imp=>imp.includes('긴급')?'nb-r':imp.includes('일반')?'nb-b':'nb-g';
    const items=notices.map(n=>`
      <div class="nitem">
        <div class="ndot ${n.pinned?'':'g'}"></div>
        <div>
          <h4>${n.pinned?'📌 ':''}${n.title}<span class="nbadge ${bc(n.importance)}">${n.importance}</span></h4>
          <p>${n.content}${n.endDate?' · ~'+n.endDate:''}</p>
        </div>
      </div>`).join('');
    ct.innerHTML=`
      <div class="hero">
        <div class="hero-tag">📢 공지사항</div>
        <h2>지학원 공지사항</h2>
        <div class="hdate">구글 스프레드시트 실시간 연동</div>
      </div>
      ${items||'<p style="text-align:center;color:#bbb;font-size:13px;padding:24px">등록된 공지가 없습니다.</p>'}
      <div class="bottom-space"></div>`;
  }catch(e){
    ct.innerHTML=`
      <div class="hero">
        <div class="hero-tag">📢 공지사항</div>
        <h2>지학원 공지사항</h2>
        <div class="hdate">구글 스프레드시트 실시간 연동</div>
      </div>
      <div style="background:#fff8e6;border:0.5px solid #fde8a0;border-radius:12px;padding:12px 14px;font-size:12px;color:#8a6200;text-align:center;margin-bottom:10px">
        공지사항을 불러오지 못했어요. 잠시 후 다시 시도해주세요.
      </div>
      <div class="bottom-space"></div>`;
  }
}

// ── 일정 ──
const HOLIDAYS={'2026-1-1':'신정','2026-1-28':'설날연휴','2026-1-29':'설날','2026-1-30':'설날연휴','2026-3-1':'삼일절','2026-5-5':'어린이날','2026-5-25':'부처님오신날','2026-6-3':'지방선거일','2026-8-15':'광복절','2026-9-24':'추석연휴','2026-9-25':'추석','2026-9-26':'추석연휴','2026-10-3':'개천절','2026-10-9':'한글날','2026-12-25':'크리스마스'};
const SAT_HOL={'2026-6-6':'현충일'};
const SPECIAL={'2026-6-4':[{type:'i',tag:'입소(모의고사)',time:'16:30 ~ 23:00'}]};
const EARLY_IN=[{s:new Date(2026,5,29),e:new Date(2026,6,2),tag:'입소(기말고사)',time:'13:00 ~ 23:00'}];
function getMonthEvts(y,m){
  const evts={},dim=new Date(y,m,0).getDate();
  for(let d=1;d<=dim;d++){
    const dt=new Date(y,m-1,d),dow=dt.getDay(),k=`${y}-${m}-${d}`,hol=HOLIDAYS[k],satHol=SAT_HOL[k];
    const list=[];
    if(satHol){evts[k]=[{type:'h',tag:satHol,time:'공휴일(토)'}];continue;}
    if(SPECIAL[k]){evts[k]=SPECIAL[k];continue;}
    let early=null;for(const p of EARLY_IN){if(dt>=p.s&&dt<=p.e){early=p;break;}}
    if(dow===5&&!hol) list.push({type:'o',tag:'퇴소',time:'16:00 ~ 21:30'});
    if(dow===0&&!hol) list.push({type:'i',tag:early?early.tag:'입소',time:early?early.time:'19:00 ~ 23:00'});
    if(hol){
      list.push({type:'h',tag:hol,time:''});
      list.push({type:'i',tag:early?early.tag:'입소',time:early?early.time:'19:00 ~ 23:00'});
      const pk=`${y}-${m}-${d-1}`;
      if(d>1&&new Date(y,m-1,d-1).getDay()!==5){if(!evts[pk])evts[pk]=[];evts[pk].push({type:'o',tag:'퇴소(공휴일 전날)',time:'16:00 ~ 21:30'});}
    }
    if(early&&dow!==0&&dow!==5&&!hol) list.push({type:'i',tag:early.tag,time:early.time});
    if(list.length) evts[k]=(evts[k]||[]).concat(list);
  }
  return evts;
}
function drawCal(){
  const evts=getMonthEvts(calY,calM);
  const firstDow=new Date(calY,calM-1,1).getDay(),dim=new Date(calY,calM,0).getDate();
  const labels=['일','월','화','수','목','금','토'];
  let cells=labels.map((l,i)=>`<div class="cdl ${i===0?'s':i===6?'sa':''}">${l}</div>`).join('');
  for(let i=0;i<firstDow;i++) cells+=`<div class="cc emp"></div>`;
  for(let d=1;d<=dim;d++){
    const dow=new Date(calY,calM-1,d).getDay(),k=`${calY}-${calM}-${d}`,hol=HOLIDAYS[k]||SAT_HOL[k],el=evts[k]||[];
    const dots=[...new Set(el.map(e=>e.type))].map(t=>`<div class="dot dot-${t}"></div>`).join('');
    let cls=d===calD?'sel':(calY===2026&&calM===5&&d===30?'tod':(hol||dow===0?'hol':dow===6?'sat':''));
    cells+=`<div class="cc ${cls}" onclick="pickDay(${d})">${d}${dots?`<div class="dots">${dots}</div>`:''}</div>`;
  }
  const selEvts=evts[`${calY}-${calM}-${calD}`]||[];
  const erows=selEvts.length?selEvts.map(e=>`<div class="erow"><span class="etag ${e.type==='o'?'et-o':e.type==='i'?'et-i':'et-h'}">${e.tag}</span><span class="edetail">${e.time}</span></div>`).join(''):'<p style="font-size:12px;color:#bbb;padding:6px 0">일정 없음</p>';
  document.getElementById('ct').innerHTML=`
    <div class="card">
      <div class="chdr">
        <button class="cnbtn" onclick="chgM(-1)">◀</button>
        <h2>${calY}년 ${calM}월</h2>
        <button class="cnbtn" onclick="chgM(1)">▶</button>
      </div>
      <div class="cgrid">${cells}</div>
      <div class="legend">
        <div class="leg"><div class="dot dot-o"></div>퇴소</div>
        <div class="leg"><div class="dot dot-i"></div>입소</div>
        <div class="leg"><div class="dot dot-h"></div>공휴일</div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">${calM}월 ${calD}일 일정</div>
      ${erows}
    </div>
    <div class="bottom-space"></div>`;
}
function pickDay(d){calD=d;drawCal();}
function chgM(dir){calM+=dir;if(calM>12){calM=1;calY++;}if(calM<1){calM=12;calY--;}calD=1;drawCal();}

// ── 외출 ──
let outingType = '외출';
function drawForm(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('ct').innerHTML=`
    <div class="card">
      <div class="ctitle">외출/외박 구분</div>
      <div style="display:flex;gap:8px;margin-bottom:4px">
        <button id="btn-outing" onclick="setOutingType('외출')"
          style="flex:1;padding:12px;border-radius:10px;border:1.5px solid #1b2a4a;background:#1b2a4a;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
          🚶 외출
        </button>
        <button id="btn-overnight" onclick="setOutingType('외박')"
          style="flex:1;padding:12px;border-radius:10px;border:1.5px solid #ddd;background:#fff;color:#888;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">
          🏠 외박
        </button>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">학생 정보</div>
      <div class="frow">
        <div class="fl"><label>이름</label><input type="text" id="sname" placeholder="홍길동"></div>
        <div class="fl"><label>학년</label>
          <select id="sgrade"><option>1학년</option><option selected>2학년</option><option>3학년</option></select>
        </div>
      </div>
      <div class="fl">
        <label>보호자 연락처</label>
        <input type="tel" id="gtel" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="card">
      <div class="ctitle" id="outing-info-title">외출 정보</div>
      <div class="fl"><label>날짜</label><input type="date" id="odate" value="${today}"></div>
      <div id="time-section">
        <div class="frow">
          <div class="fl"><label>외출 시간</label><input type="time" id="otime" value="16:00" max="23:00"></div>
          <div class="fl"><label>귀사 시간</label><input type="time" id="itime" value="21:30" max="23:00"></div>
        </div>
        <p style="font-size:10px;color:#bbb;margin-top:-6px;margin-bottom:8px">귀사 시간은 23:00까지</p>
      </div>
      <div class="fl"><label>사유</label><textarea id="oreason" placeholder="외출 사유를 입력하세요"></textarea></div>
    </div>
    <div style="background:#e8f8f0;border:0.5px solid #a8dfc0;border-radius:12px;padding:16px;text-align:center;display:none;margin-bottom:10px" id="outing-result">
      <div style="font-size:32px;margin-bottom:8px">✅</div>
      <div style="font-size:14px;font-weight:500;color:#1a7a4a;margin-bottom:4px">신청이 완료됐어요</div>
      <div style="font-size:12px;color:#2a9a5a">선생님께 전달되었습니다.</div>
    </div>
    <button class="sbtn" id="o-submit" onclick="submitOuting()">신청서 제출</button>
    <div class="bottom-space"></div>`;
  document.getElementById('sname').addEventListener('input',function(){});
}
function setOutingType(type){
  outingType=type;
  const isOuting=type==='외출';
  document.getElementById('btn-outing').style.cssText=`flex:1;padding:12px;border-radius:10px;border:1.5px solid ${isOuting?'#1b2a4a':'#ddd'};background:${isOuting?'#1b2a4a':'#fff'};color:${isOuting?'#fff':'#888'};font-size:13px;font-weight:${isOuting?'600':'500'};cursor:pointer;font-family:inherit`;
  document.getElementById('btn-overnight').style.cssText=`flex:1;padding:12px;border-radius:10px;border:1.5px solid ${!isOuting?'#1b2a4a':'#ddd'};background:${!isOuting?'#1b2a4a':'#fff'};color:${!isOuting?'#fff':'#888'};font-size:13px;font-weight:${!isOuting?'600':'500'};cursor:pointer;font-family:inherit`;
  document.getElementById('time-section').style.display=isOuting?'block':'none';
  document.getElementById('outing-info-title').textContent=isOuting?'외출 정보':'외박 정보';
  document.getElementById('oreason').placeholder=isOuting?'외출 사유를 입력하세요':'외박 사유를 입력하세요';
}
async function submitOuting(){
  const name=document.getElementById('sname')?.value.trim();
  const grade=document.getElementById('sgrade')?.value;
  const guardian=document.getElementById('gtel')?.value.trim();
  const date=document.getElementById('odate')?.value;
  const outTime=outingType==='외출'?document.getElementById('otime')?.value:'';
  const inTime=outingType==='외출'?document.getElementById('itime')?.value:'';
  const reason=document.getElementById('oreason')?.value.trim();
  if(!name||!date||!reason){alert('이름, 날짜, 사유는 필수입니다.');return;}
  if(outingType==='외출'&&(!outTime||!inTime)){alert('외출/귀사 시간을 입력해주세요.');return;}
  if(outingType==='외출'&&inTime>'23:00'){alert('귀사 시간은 23:00까지입니다.');return;}
  const btn=document.getElementById('o-submit');
  btn.disabled=true;btn.textContent='제출 중...';
  const now=new Date();
  const datetime=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const OUTING_URL='https://script.google.com/macros/s/AKfycbw0pQTEt1wAxnDScm_muKQ3TDQoThxMQhlJw3lLBfLBy-dks1Roddk_pp8bHSWOeLQN/exec';
  try{
    await fetch(OUTING_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,grade,guardian:guardian||'미입력',type:outingType,date,outTime,inTime,reason,datetime})
    });
    document.getElementById('outing-result').style.display='block';
    btn.style.display='none';
  }catch(e){
    btn.disabled=false;btn.textContent='신청서 제출';
    alert('제출 중 오류가 발생했습니다.');
  }
}
async function lookup(name){
  const gtel=document.getElementById('gtel'),gres=document.getElementById('gres');
  if(!gtel||!gres) return;
  if(!name||name.length<2){gtel.value='';gres.style.display='none';return;}
  clearTimeout(lookupTimer);
  lookupTimer=setTimeout(async()=>{
    gtel.value='조회 중...';
    const s=await getStudents();
    const f=s.find(x=>x['이름']&&x['이름'].includes(name));
    if(f&&f['전화번호_보호자']){gtel.value=f['전화번호_보호자'];gres.innerHTML='✓ '+f['이름']+' 보호자 번호 확인됨';gres.style.display='block';}
    else{gtel.value='';gtel.placeholder=s.length?'일치하는 학생 없음':'조회 실패 · 직접 입력';}
  },600);
}
async function getStudents(){
  if(studentDB) return studentDB;
  try{
    const res=await fetch('students.csv');
    if(!res.ok) throw new Error();
    const text=await res.text();
    const lines=text.replace(/^\uFEFF/,'').trim().split('\n');
    const h=lines[0].split(',');
    const idx={이름:h.indexOf('이름'),학생번호:h.indexOf('학생번호'),보호자번호:h.indexOf('보호자번호'),입소상태:h.indexOf('입소상태')};
    studentDB=lines.slice(1).filter(l=>l.trim()).map(l=>{const c=l.split(',');return{이름:c[idx.이름]?.trim(),전화번호_본인:c[idx.학생번호]?.trim(),전화번호_보호자:c[idx.보호자번호]?.trim(),입소상태:c[idx.입소상태]?.trim()};}).filter(s=>s.입소상태==='입소 중');
  }catch(e){studentDB=[];}
  return studentDB;
}
