<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>지학원라이프</title>
<link rel="preload" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"></noscript>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh}
.header{background:#1b2a4a;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header h1{font-size:16px;font-weight:600;color:#fff}
.header p{font-size:10px;color:rgba(255,255,255,0.55);margin-top:1px}
.tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #e5e5e5;position:sticky;top:62px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:999px;border:0.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#888;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab i{font-size:14px}
.tab.active{background:#1b2a4a;color:#fff;border-color:#1b2a4a}
.content{padding:16px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;padding:14px 16px;margin-bottom:10px}
.ctitle{font-size:11px;font-weight:500;color:#999;margin-bottom:12px}
.hero{background:#1b2a4a;border-radius:14px;padding:16px;margin-bottom:10px;color:#fff}
.hero-tag{font-size:10px;background:rgba(255,255,255,0.2);border-radius:999px;padding:3px 9px;display:inline-block;margin-bottom:8px}
.hero h2{font-size:15px;font-weight:600;line-height:1.5}
.hero .hdate{font-size:10px;color:rgba(255,255,255,0.55);margin-top:6px}
.nitem{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.ndot{width:7px;height:7px;border-radius:50%;background:#1b2a4a;flex-shrink:0;margin-top:4px}
.ndot.g{background:#ccc}
.nitem h4{font-size:13px;font-weight:500;color:#1a1a2e;margin-bottom:2px}
.nitem p{font-size:11px;color:#999;white-space:pre-line}
.nbadge{font-size:9px;padding:2px 6px;border-radius:999px;margin-left:4px}
.nb-r{background:#ffebeb;color:#c0392b}
.nb-b{background:#e8f0fe;color:#1a56db}
.nb-g{background:#f0f0f0;color:#666}
.fl{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl label{font-size:11px;color:#999;font-weight:500}
.fl input,.fl select,.fl textarea{font-size:13px;padding:9px 11px;border-radius:10px;border:0.5px solid #ddd;background:#fafafa;color:#1a1a2e;font-family:inherit;width:100%}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:#1b2a4a}
.fl textarea{resize:none;height:100px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbtn{width:100%;padding:12px;background:#1b2a4a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.sbtn:disabled{background:#aaa;cursor:not-allowed}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chdr h2{font-size:14px;font-weight:600;color:#1a1a2e}
.cnbtn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit;color:#555}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cdl{text-align:center;font-size:10px;color:#bbb;padding:3px 0}
.cdl.s{color:#e74c3c}.cdl.sa{color:#3498db}
.cc{text-align:center;font-size:11px;border-radius:8px;cursor:pointer;color:#1a1a2e;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;gap:2px}
.cc.sel{background:#1b2a4a;color:#fff}
.cc.hol{color:#e74c3c}
.cc.sat{color:#3498db}
.cc.emp{pointer-events:none;opacity:0}
.dots{display:flex;gap:2px;justify-content:center}
.dot{width:4px;height:4px;border-radius:50%}
.dot-o{background:#e74c3c}.dot-i{background:#2ecc71}.dot-h{background:#f39c12}
.erow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid #f5f5f5}
.erow:last-child{border-bottom:none}
.etag{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:500;flex-shrink:0}
.et-o{background:#ffebeb;color:#c0392b}
.et-i{background:#e8f8f0;color:#1a7a4a}
.et-h{background:#fff5e6;color:#d35400}
.edetail{font-size:12px;color:#666}
.legend{display:flex;gap:14px;padding:4px 2px}
.leg{font-size:10px;color:#999;display:flex;align-items:center;gap:4px}
.ccard{background:#fff;border-radius:14px;border:0.5px solid #ebebeb;overflow:hidden;margin-bottom:10px}
.crow{display:flex;align-items:center;padding:13px 15px;gap:12px;border-bottom:0.5px solid #f5f5f5}
.crow:last-child{border-bottom:none}
.cico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ci-g{background:#e1f5ee;color:#0f6e56}
.ci-b{background:#e6f1fb;color:#185fa5}
.ci-a{background:#faeeda;color:#854f0b}
.ci-r{background:#ffebeb;color:#c0392b}
.cn2{font-size:13px;font-weight:500;color:#1a1a2e}
.cr2{font-size:11px;color:#999}
.cbtn{background:#1b2a4a;color:#fff;border:none;border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0;text-decoration:none}
.notice-bottom{background:#f9f9f9;border-radius:12px;padding:11px 13px;font-size:12px;color:#999;line-height:1.6;border:0.5px solid #ebebeb}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.cat-btn{padding:11px 8px;border-radius:10px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:#555;text-align:center}
.cat-btn.selected{border-color:#1b2a4a;background:#1b2a4a;color:#fff;font-weight:500}
.success-box{background:#e8f8f0;border:0.5px solid #a8dfc0;border-radius:12px;padding:16px;text-align:center;display:none;margin-bottom:10px}
.bottom-space{height:24px}
.sbox{background:#1b2a4a;border-radius:14px;padding:16px;margin-bottom:12px;color:#fff}
.sbox.purple{background:linear-gradient(135deg,#2d1b4a,#4a2d7a)}
.sbox h3{font-size:16px;font-weight:600;margin-bottom:4px}
.sbox p{font-size:11px;opacity:0.7;line-height:1.6}
.warnbox{background:#fff8e6;border:0.5px solid #fde8a0;border-radius:12px;padding:12px 14px;font-size:12px;color:#8a6200;text-align:center;line-height:1.5}
.loading{text-align:center;padding:48px 0;color:#bbb;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏫</div>
  <div>
    <h1>지학원라이프</h1>
    <p>산남고 지학원 학사생 전용</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tb0" onclick="go(0)"><i class="ti ti-speakerphone"></i>공지</button>
  <button class="tab" id="tb1" onclick="go(1)"><i class="ti ti-calendar-event"></i>일정</button>
  <button class="tab" id="tb2" onclick="go(2)"><i class="ti ti-flame"></i>열품타</button>
  <button class="tab" id="tb3" onclick="go(3)"><i class="ti ti-chart-bar"></i>투표</button>
  <button class="tab" id="tb4" onclick="go(4)"><i class="ti ti-phone-call"></i>연락</button>
  <button class="tab" id="tb5" onclick="go(5)"><i class="ti ti-message-report"></i>민원</button>
</div>

<div class="content" id="ct"></div>

<script>
const SCRIPT_URL = 'https://jihakwon-life.vercel.app/api';   // Vercel+Neon (구 Google Apps Script)
// 달력 표시 가능 범위: 2026년 6월 ~ 8월
const CAL_MIN = {y:2026, m:6};
const CAL_MAX = {y:2026, m:8};

// 오늘이 표시 범위 안이면 그 달을, 아니면 시작월(6월)을 기본으로
const _now = new Date();
const _inRange = _now.getFullYear() === CAL_MIN.y
  && _now.getMonth()+1 >= CAL_MIN.m && _now.getMonth()+1 <= CAL_MAX.m;
let calY = CAL_MIN.y;
let calM = _inRange ? _now.getMonth()+1 : CAL_MIN.m;
let calD = _inRange ? _now.getDate() : 1;
let selCat = '';

function go(i) {
  for (let j = 0; j < 6; j++) document.getElementById('tb'+j).classList.toggle('active', j===i);
  document.getElementById('ct').innerHTML = '';
  [drawNotice, drawCal, drawYeolpumta, drawVote, drawContact, drawComplaint][i]();
  window.scrollTo(0, 0);
}

// ════════ 공지 (구글시트 연동) ════════
async function drawNotice() {
  const ct = document.getElementById('ct');
  ct.innerHTML = `<div style="text-align:center;padding:48px 0;color:#bbb;font-size:13px">불러오는 중...</div>`;
  try {
    const res = await fetch(SCRIPT_URL + '?type=notices');
    const notices = await res.json();
    if (!Array.isArray(notices)) throw new Error();
    const bc = imp => imp.includes('긴급') ? 'nb-r' : imp.includes('일반') ? 'nb-b' : 'nb-g';
    const items = notices.map(n => `
      <div class="nitem">
        <div class="ndot ${n.pinned ? '' : 'g'}"></div>
        <div style="flex:1">
          <h4>${n.pinned ? '📌 ' : ''}${n.title}<span class="nbadge ${bc(n.importance)}">${n.importance}</span></h4>
          <p>${n.content}</p>
          ${n.attach ? `<a href="${n.attach}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;background:#e8f0fe;color:#1a56db;font-size:11px;font-weight:500;padding:5px 10px;border-radius:8px;text-decoration:none">📎 첨부파일 보기</a>` : ''}
        </div>
      </div>`).join('');
    ct.innerHTML = `
      <div class="hero">
        <div class="hero-tag">📢 공지사항</div>
        <h2>지학원 공지사항</h2>
        <div class="hdate">규칙을 잘 지키며 서로 배려하는 학사생 💙</div>
      </div>
      <a href="https://school.cbe.go.kr/sannam-h/M011003/" target="_blank" style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#e8f0fe,#f0e8fb);border-radius:14px;border:0.5px solid #d8d0f0;padding:14px 16px;margin-bottom:12px;text-decoration:none">
        <div style="width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.06)">🏫</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:#1b2a4a;margin-bottom:2px">지학원 게시판 바로가기</div>
          <div style="font-size:11px;color:#7a6a9a">산남고 학교 홈페이지에서 더 보기 →</div>
        </div>
        <div style="color:#9a8ac0;font-size:18px">›</div>
      </a>
      ${items || '<p style="text-align:center;color:#bbb;font-size:13px;padding:24px">등록된 공지가 없습니다.</p>'}
      <div class="bottom-space"></div>`;
  } catch(e) {
    ct.innerHTML = `
      <div class="hero">
        <div class="hero-tag">📢 공지사항</div>
        <h2>지학원 공지사항</h2>
        <div class="hdate">규칙을 잘 지키며 서로 배려하는 학사생</div>
      </div>
      <div style="background:#fff8e6;border:0.5px solid #fde8a0;border-radius:12px;padding:12px 14px;font-size:12px;color:#8a6200;text-align:center">
        공지사항을 불러오지 못했어요.<br>잠시 후 다시 시도해주세요.
      </div>
      <div class="bottom-space"></div>`;
  }
}

// ════════ 일정 (관리자 페이지 → '📅 일정' 시트에서 불러옴) ════════
// 특별일정(시험·행사·변경된 입퇴소)은 관리자 페이지에서 등록 → 여기서 자동 표시.
// 공통 규칙(금 퇴소·일 입소·방학)은 아래 코드에 그대로 둠.
let EVENTS = {};          // {연-월-일: [{type,tag,time}]} — 시트에서 채워짐
let schedLoaded = false;

// 시트 한 줄 → 달력 이벤트로 변환 (입소시간 있으면 입소, 퇴소시간 있으면 퇴소, 둘 다 없으면 행사)
function buildEvents(rows) {
  const map = {};
  rows.forEach(r => {
    if (!r.date) return;
    const p = String(r.date).split('-').map(Number);
    const k = `${p[0]}-${p[1]}-${p[2]}`;
    if (!map[k]) map[k] = [];
    if (r.inTime)  map[k].push({ type:'i', tag: r.title || '입소', time: r.inTime });
    if (r.outTime) map[k].push({ type:'o', tag: r.title || '퇴소', time: r.outTime });
    if (!r.inTime && !r.outTime) map[k].push({ type:'h', tag: r.title || '', time: r.note || '' });
  });
  return map;
}

async function loadSchedule() {
  try {
    const res = await fetch(SCRIPT_URL + '?type=schedule');
    const rows = await res.json();
    EVENTS = Array.isArray(rows) ? buildEvents(rows) : {};
  } catch (e) { EVENTS = {}; }
  schedLoaded = true;
}

// 방학 기간 (기본 금/일 규칙 적용 안 함)
const VACATIONS = [
  { start: new Date(2026,6,17), end: new Date(2026,7,10) },   // 여름방학 7/17~8/10 (기숙사 개방일은 EVENTS로 별도 표시)
  { start: new Date(2026,11,29), end: new Date(2027,1,28) },  // 겨울방학
];

function isVacation(date) {
  return VACATIONS.some(v => date >= v.start && date <= v.end);
}

function getMonthEvts(y, m) {
  const evts = {};
  const dim = new Date(y, m, 0).getDate();
  for (let d = 1; d <= dim; d++) {
    const dt = new Date(y, m-1, d);
    const dow = dt.getDay();
    const k = `${y}-${m}-${d}`;

    // 하드코딩 이벤트가 있으면 우선
    if (EVENTS[k]) { evts[k] = EVENTS[k]; continue; }

    // 방학 중에는 기본 규칙 미적용
    if (isVacation(dt)) continue;

    // 기본 규칙: 금 퇴소, 일 입소
    if (dow === 5) evts[k] = [{type:'o', tag:'퇴소', time:'16:00 ~ 21:30'}];
    if (dow === 0) evts[k] = [{type:'i', tag:'입소', time:'19:00 ~ 23:00'}];
  }
  return evts;
}

async function drawCal() {
  if (!schedLoaded) {
    document.getElementById('ct').innerHTML = `<div style="text-align:center;padding:48px 0;color:#bbb;font-size:13px">일정 불러오는 중...</div>`;
    await loadSchedule();
  }
  const evts = getMonthEvts(calY, calM);
  const firstDow = new Date(calY, calM-1, 1).getDay();
  const dim = new Date(calY, calM, 0).getDate();
  const labels = ['일','월','화','수','목','금','토'];

  let cells = labels.map((l,i) =>
    `<div class="cdl ${i===0?'s':i===6?'sa':''}">${l}</div>`).join('');
  for (let i = 0; i < firstDow; i++) cells += `<div class="cc emp"></div>`;
  for (let d = 1; d <= dim; d++) {
    const dow = new Date(calY, calM-1, d).getDay();
    const k = `${calY}-${calM}-${d}`;
    const el = evts[k] || [];
    const hasHol = el.some(e => e.type === 'h');
    const dots = [...new Set(el.map(e=>e.type))]
      .map(t=>`<div class="dot dot-${t}"></div>`).join('');
    let cls = d === calD ? 'sel' : (hasHol || dow===0 ? 'hol' : dow===6 ? 'sat' : '');
    cells += `<div class="cc ${cls}" onclick="pickDay(${d})">${d}${dots ? `<div class="dots">${dots}</div>` : ''}</div>`;
  }

  const selEvts = evts[`${calY}-${calM}-${calD}`] || [];
  const erows = selEvts.length
    ? selEvts.map(e => `
        <div class="erow">
          <span class="etag ${e.type==='o'?'et-o':e.type==='i'?'et-i':'et-h'}">${e.tag}</span>
          <span class="edetail">${e.time}</span>
        </div>`).join('')
    : '<p style="font-size:12px;color:#bbb;padding:4px 0">일정 없음</p>';

  const prevDisabled = (calY === CAL_MIN.y && calM <= CAL_MIN.m);
  const nextDisabled = (calY === CAL_MAX.y && calM >= CAL_MAX.m);

  document.getElementById('ct').innerHTML = `
    <div class="card">
      <div class="chdr">
        <button class="cnbtn" onclick="chgM(-1)" ${prevDisabled?'style="opacity:0.3;pointer-events:none"':''}>◀</button>
        <h2>${calY}년 ${calM}월</h2>
        <button class="cnbtn" onclick="chgM(1)" ${nextDisabled?'style="opacity:0.3;pointer-events:none"':''}>▶</button>
      </div>
      <div class="cgrid">${cells}</div>
      <div class="legend">
        <div class="leg"><div class="dot dot-o"></div>퇴소</div>
        <div class="leg"><div class="dot dot-i"></div>입소</div>
        <div class="leg"><div class="dot dot-h"></div>공휴일·행사</div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">${calM}월 ${calD}일 일정</div>
      ${erows}
    </div>
    <div style="background:#fff8e6;border:0.5px solid #fde8a0;border-radius:12px;padding:11px 14px;font-size:12px;color:#8a6200;text-align:center;line-height:1.5">
      ⚠️ 7월부터는 일정에 따라 추후 변경 가능
    </div>
    <div class="bottom-space"></div>`;
}

function pickDay(d) { calD = d; drawCal(); }
function chgM(dir) {
  const newM = calM + dir;
  // 범위 체크 (2026년 6~8월만)
  if (calY === CAL_MAX.y && newM > CAL_MAX.m) return;
  if (calY === CAL_MIN.y && newM < CAL_MIN.m) return;
  calM = newM;
  if (calM > 12) { calM = 1; calY++; }
  if (calM < 1)  { calM = 12; calY--; }
  calD = 1;
  drawCal();
}

// ════════ 열품타 ════════
const YEOLPUMTA = [
  {grade:'1학년', emoji:'🌱', color:'#2ecc71', light:'#e8f8f0', link:'https://link.yeolpumta.com/P3R5cGU9Z3JvdXBJbnZpdGUmaWQ9NjQxMDQxNA=='},
  {grade:'2학년', emoji:'🌿', color:'#3498db', light:'#e6f1fb', link:'https://link.yeolpumta.com/P3R5cGU9Z3JvdXBJbnZpdGUmaWQ9NjQxMDQzMw=='},
  {grade:'3학년', emoji:'🌳', color:'#9b59b6', light:'#f0e8fb', link:'https://link.yeolpumta.com/P3R5cGU9Z3JvdXBJbnZpdGUmaWQ9NjQxMDQzOQ=='},
];
function drawYeolpumta() {
  const cards = YEOLPUMTA.map(r => `
    <a href="${r.link}" target="_blank" style="display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;border:0.5px solid #ebebeb;padding:18px 16px;margin-bottom:10px;text-decoration:none;cursor:pointer">
      <div style="width:50px;height:50px;border-radius:50%;background:${r.light};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${r.emoji}</div>
      <div style="flex:1">

      <div style="background:${r.color};color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:500;flex-shrink:0">입장</div>

      <div style="font-size:11px;opacity:0.7;line-height:1.7">학년별 방에 입장해서 함께 공부해요!<br>순공시간 체크하고 우수학사생으로 선발:)</div>
    </div>
    ${cards}
    <div style="background:#f9f9f9;border-radius:12px;padding:12px 14px;font-size:11px;color:#aaa;line-height:1.7;border:0.5px solid #ebebeb">
      💡 열품타 앱이 설치되어 있어야 입장할 수 있어요.

}

// ════════ 투표 (구글시트 연동) ════════
let voteSelections = {}; // {voteId: [선택항목들]}

async function drawVote() {
  const ct = document.getElementById('ct');
  ct.innerHTML = `<div style="text-align:center;padding:48px 0;color:#bbb;font-size:13px">투표 불러오는 중...</div>`;
  try {
    const res = await fetch(SCRIPT_URL + '?type=votes');
    const votes = await res.json();
    if (!Array.isArray(votes)) throw new Error();

    if (votes.length === 0) {
      ct.innerHTML = `
        <div style="background:#1b2a4a;border-radius:14px;padding:16px;margin-bottom:12px;color:#fff">
          <div style="font-size:16px;font-weight:600;margin-bottom:4px">🗳️ 투표</div>
          <div style="font-size:11px;opacity:0.7">진행 중인 투표가 여기에 표시됩니다.</div>
        </div>
        <div style="text-align:center;color:#bbb;font-size:13px;padding:30px">현재 진행 중인 투표가 없어요.</div>
        <div class="bottom-space"></div>`;
      return;
    }

    voteSelections = {};
    const cards = votes.map(v => {
      voteSelections[v.id] = [];
      const opts = v.options.map(opt => `
        <button class="vote-opt" data-vote="${v.id}" data-opt="${opt}" onclick="toggleVote('${v.id}','${opt.replace(/'/g,"\\'")}','${v.method}')"
          style="display:flex;align-items:center;gap:10px;width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;color:#1a1a2e;margin-bottom:7px;text-align:left">
          <span class="vote-check" style="width:20px;height:20px;border-radius:${v.method==='복수'?'5px':'50%'};border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff"></span>
          <span>${opt}</span>
        </button>`).join('');
      return `
        <div class="card" data-votecard="${v.id}">
          <div style="font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:4px">${v.title}</div>
          ${v.desc ? `<div style="font-size:12px;color:#888;margin-bottom:6px">${v.desc}</div>` : ''}
          <div style="font-size:10px;color:#9a8ac0;margin-bottom:12px">${v.method==='복수'?'복수 선택 가능':'하나만 선택'}</div>
          ${opts}
        </div>`;
    }).join('');

    const formInfo = `
      <div class="card">
        <div class="ctitle">투표자 정보</div>
        <div class="frow">
          <div class="fl"><label>학번</label><input type="number" id="v-hakbun" placeholder="예) 2427"></div>
          <div class="fl"><label>이름</label><input type="text" id="v-name" placeholder="산남인"></div>
        </div>
      </div>`;

    ct.innerHTML = `
      <div style="background:#1b2a4a;border-radius:14px;padding:16px;margin-bottom:12px;color:#fff">
        <div style="font-size:16px;font-weight:600;margin-bottom:4px">🗳️ 투표</div>
        <div style="font-size:11px;opacity:0.7">아래 투표에 참여해 주세요!</div>
      </div>
      ${formInfo}
      ${cards}
      <div class="success-box" id="vote-result">
        <div style="font-size:32px;margin-bottom:8px">✅</div>
        <div style="font-size:14px;font-weight:500;color:#1a7a4a;margin-bottom:4px">투표가 완료되었습니다</div>
        <div style="font-size:12px;color:#2a9a5a">소중한 의견 감사해요!</div>
      </div>
      <button class="sbtn" id="v-submit" onclick="submitVote()">투표 제출하기</button>
      <div class="bottom-space"></div>`;
    window._votes = votes;
  } catch(e) {
    ct.innerHTML = `
      <div style="background:#1b2a4a;border-radius:14px;padding:16px;margin-bottom:12px;color:#fff">
        <div style="font-size:16px;font-weight:600;margin-bottom:4px">🗳️ 투표</div>
      </div>
      <div style="background:#fff8e6;border:0.5px solid #fde8a0;border-radius:12px;padding:12px 14px;font-size:12px;color:#8a6200;text-align:center">
        투표를 불러오지 못했어요. 잠시 후 다시 시도해주세요.
      </div>
      <div class="bottom-space"></div>`;
  }
}

function toggleVote(voteId, opt, method) {
  const sel = voteSelections[voteId];
  const idx = sel.indexOf(opt);

  if (method === '단일') {
    voteSelections[voteId] = idx >= 0 ? [] : [opt];
  } else {
    if (idx >= 0) sel.splice(idx, 1);
    else sel.push(opt);
  }

  // UI 업데이트
  document.querySelectorAll(`.vote-opt[data-vote="${voteId}"]`).forEach(btn => {
    const o = btn.getAttribute('data-opt');
    const checked = voteSelections[voteId].includes(o);
    const check = btn.querySelector('.vote-check');
    if (checked) {
      btn.style.borderColor = '#1b2a4a';
      btn.style.background = '#f0f4fc';
      check.style.background = '#1b2a4a';
      check.style.borderColor = '#1b2a4a';
      check.textContent = '✓';
    } else {
      btn.style.borderColor = '#e0e0e0';
      btn.style.background = '#fff';
      check.style.background = '#fff';
      check.style.borderColor = '#ccc';
      check.textContent = '';
    }
  });
}

async function submitVote() {
  const hakbun = document.getElementById('v-hakbun')?.value.trim();
  const name = document.getElementById('v-name')?.value.trim();
  if (!hakbun || !name) { alert('학번과 이름을 입력해 주세요.'); return; }

  const votes = window._votes || [];
  const answered = votes.filter(v => voteSelections[v.id] && voteSelections[v.id].length > 0);
  if (answered.length === 0) { alert('하나 이상의 투표에 참여해 주세요.'); return; }

  const btn = document.getElementById('v-submit');
  btn.disabled = true; btn.textContent = '제출 중...';

  const now = new Date();
  const datetime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  try {
    for (const v of answered) {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({
          type: 'vote', voteId: v.id, voteTitle: v.title,
          hakbun, name, selected: voteSelections[v.id], datetime
        })
      });
    }
    document.getElementById('vote-result').style.display = 'block';
    btn.style.display = 'none';
  } catch(e) {
    btn.disabled = false; btn.textContent = '투표 제출하기';
    alert('제출 중 오류가 발생했습니다.');
  }
}

function selectCat(cat) {
  selCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b =>
    b.classList.toggle('selected', b.textContent.includes(cat)));
}

async function submitComplaint() {
  const hakbun  = document.getElementById('c-hakbun')?.value.trim();
  const name    = document.getElementById('c-name')?.value.trim();
  const content = document.getElementById('c-content')?.value.trim();
  if (!hakbun || !name || !selCat || !content) {
    alert('모든 항목을 입력해 주세요.');
    return;
  }
  const btn = document.getElementById('c-submit');
  btn.disabled = true;
  btn.textContent = '제출 중...';

  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({type:'complaint', hakbun, name, category:selCat, content, datetime:dateStr})
    });
    document.getElementById('complaint-result').style.display = 'block';
    btn.style.display = 'none';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '민원 제출하기';
    alert('제출 중 오류가 발생했습니다. 다시 시도해 주세요.');
  }
}
